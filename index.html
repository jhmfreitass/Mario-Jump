<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Jump</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./images/Mario-ico.ico">

    <script src="./js/script.js" defer></script>
</head>

<body>

    <div class="game-board">

        <!-- Contador -->
        <div class="score">
            Pontos: <span id="score">0</span>
        </div>

        <!-- Nuvens -->
        <img src="./images/clouds.png" class="clouds" alt="Nuvens">

        <!-- Mario -->
        <img src="./images/mario.gif" class="mario" alt="Mario">

        <!-- Cano -->
        <img src="./images/pipe.png" class="pipe" alt="Cano">

        <!-- Chão -->
        <div class="ground"></div>

        <!-- Tela de Game Over -->
        <div class="game-over-screen">

            <h1>GAME OVER</h1>

            <button class="restart">
                🔄 Reiniciar
            </button>

        </div>

    </div>

</body>

</html>
